<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700&family=Open+Sans:wght@300..800&family=Roboto:wght@100..900&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/contacts.css">

  <title>Contactos</title>
</head>

<body>

  <main class="container-fluid p-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="d-flex align-items-center">
        <a href="home.html" class="btn btn-link text-dark text-decoration-none p-0 me-3">
          <i class="bi bi-arrow-left fs-3"></i>
        </a>
        <h3 class="mb-0">Contactos</h3>
      </div>

      <button
        id="btnNuevoContacto"
        class="btn btn-link text-dark p-0"
        data-bs-toggle="modal"
        data-bs-target="#modalContacto">
        <i class="bi bi-plus-lg fs-3"></i>
      </button>
    </div>

    <div id="listaContactos"></div>
    <div id="alertMessage" class="alert alert-dismissible fade d-none mt-3" role="alert">
      <span id="alertText"></span>
      <button
        id="btnCloseAlert"
        type="button"
        class="btn-close">
      </button>
    </div>
  </main>

  <div class="modal fade" id="modalContacto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">
            Agregar contacto
          </h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal">
          </button>
        </div>
        <div class="modal-body">
          <label class="form-label">
            Nombre de usuario
          </label>
          <input
            id="txtBuscar"
            type="text"
            class="form-control"
            placeholder="Ingrese un usuario">
        </div>
        <div class="modal-footer">
          <button
            class="btn btn-secondary"
            data-bs-dismiss="modal">
            Cancelar
          </button>
          <button
            id="btnAgregar"
            class="btn btn-primary">
            Agregar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/storage.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/contacts.js"></script>

</body>

</html>
