<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

  <link rel="stylesheet" href="../assets/css/style.css" />
  <title>Inicia sesión</title>
</head>

<body class="container">
  <header>
    <a href="../index.html" class="fs-2"><span>Volver al incio</span></a>
  </header>
  <main>
    <div class="col-11">
      <h2 class="display-4 fw-medium">Registrarse</h2>
      <form id="register-form">
        <div class="form-group form-floating mb-3">
          <input type="text" class="form-control is-valid" id="inputUsuario"
            aria-describedby="emailHelp" />
          <label for="inputUsuario" class="form-control-label">Usuario</label>
        </div>
        <div class="form-group form-floating mb-3">
          <input type="password" class="form-control is-invalid" id="inputPassword" />
          <label for="inputPassword" class="form-control-label">Contraseña</label>
        </div>
        <div class="form-group form-floating mb-3">
          <input type="password" class="form-control is-invalid" id="inputConfirmPassword" />
          <label for="inputConfirmPassword" class="form-control-label">Confirma tu contraseña</label>
        </div>
        <div class="text-center mt-5 mx-auto mb-3">
          <button type="submit" class="btn btn-lg btn-primary my-btn" id="btnRegister">Registrarse</button>
          <p class="text-secondary">¿Ya tienes una cuenta? <a href="login.html" class="style-none">Inicia sesión</a></p>
        </div>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
